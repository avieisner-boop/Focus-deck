<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#f6f5f1" />
<title>TradeMesh — Broker Network Marketplace (Prototype)</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23047857'/%3E%3Cpath d='M14 40l12-16 8 10 6-7 10 13' stroke='white' stroke-width='5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<style>
  /* ============ DESIGN TOKENS — "Ledger" direction ============
     Paper-white surfaces, ink-navy text, deep emerald accent, serif
     headlines. Dark variant keeps the same brand character. */
  :root {
    --bg: #f6f5f1; --bg-soft: #efede6; --panel: #ffffff; --panel-2: #f6f4ee;
    --line: #e4e1d6; --line-soft: #eceade;
    --text: #1c2433; --text-2: #465062; --muted: #7d8494;
    --accent: #047857; --accent-2: #0f766e;
    --accent-soft: rgba(4,120,87,.08); --accent-ring: rgba(4,120,87,.25);
    --ok: #047857; --warn: #b45309; --danger: #b91c1c; --gold: #a16207; --violet: #6d28d9;
    --r-sm: 5px; --r-md: 8px; --r-lg: 11px; --r-xl: 16px;
    --shadow-sm: 0 1px 2px rgba(28,36,51,.06);
    --shadow-md: 0 2px 6px rgba(28,36,51,.06), 0 1px 2px rgba(28,36,51,.04);
    --shadow-lg: 0 10px 30px rgba(28,36,51,.10), 0 2px 8px rgba(28,36,51,.05);
    --ease: cubic-bezier(.22,.61,.36,1);
  }
  [data-theme="dark"] {
    --bg: #10141f; --bg-soft: #171c2a; --panel: #1a2130; --panel-2: #202839;
    --line: #2a3347; --line-soft: #232b3d;
    --text: #e9ecf4; --text-2: #c3cad9; --muted: #8791a5;
    --accent: #10b981; --accent-2: #34d399;
    --accent-soft: rgba(16,185,129,.12); --accent-ring: rgba(16,185,129,.30);
    --ok: #34d399; --warn: #fbbf24; --danger: #ef4444; --gold: #fbbf24; --violet: #a78bfa;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.18);
    --shadow-md: 0 2px 6px rgba(0,0,0,.18), 0 1px 2px rgba(0,0,0,.10);
    --shadow-lg: 0 12px 32px rgba(0,0,0,.28), 0 2px 8px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(1000px 500px at 85% -15%, rgba(4,120,87,.05), transparent 60%),
      radial-gradient(800px 420px at -10% 115%, rgba(15,118,110,.04), transparent 60%),
      var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.005em;
  }
  button, input, textarea, select { font: inherit; color: inherit; }
  button { cursor: pointer; border: 0; background: transparent; }
  input, textarea, select {
    background: var(--bg-soft); border: 1px solid var(--line); color: var(--text);
    border-radius: var(--r-md); padding: 8px 11px; outline: none;
    transition: border-color .15s var(--ease), box-shadow .15s var(--ease);
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
  textarea { resize: vertical; min-height: 60px; line-height: 1.5; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: var(--r-md);
    background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    font-weight: 500; font-size: 13px; white-space: nowrap;
    transition: background .15s var(--ease), border-color .15s var(--ease), transform .08s var(--ease);
  }
  .btn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: linear-gradient(180deg, #059669 0%, #047857 100%); color: #fff; border-color: transparent; }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.danger { color: var(--danger); }
  .btn.danger:hover { background: rgba(239,68,68,.10); border-color: rgba(239,68,68,.45); }
  .btn.small { padding: 4px 9px; font-size: 12px; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ============ LAYOUT ============ */
  #topbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 16px; border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--panel) 82%, transparent);
    backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 40;
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 16px; }
  .brand .logo {
    width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center;
    background: linear-gradient(135deg, #059669, #047857); color: #fff; font-size: 15px;
  }
  /* Ledger serif voice: headlines, brand, money */
  .brand, h1.viewtitle, h2.sec, #modal h3, .price {
    font-family: Georgia, 'Times New Roman', serif; letter-spacing: 0;
  }
  .brand .proto { font-size: 10px; font-weight: 600; color: var(--muted); border: 1px solid var(--line); padding: 2px 6px; border-radius: 99px; letter-spacing: .04em; }
  #actingas {
    display: flex; align-items: center; gap: 8px; margin-left: auto;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 5px 10px;
  }
  #actingas .lbl { font-size: 11px; color: var(--muted); }
  #actingas select { border: 0; background: transparent; padding: 2px 4px; font-weight: 600; font-size: 13px; }
  #actingas select:focus { box-shadow: none; }
  .rolechips { display: flex; gap: 4px; }

  #shell { display: flex; min-height: calc(100vh - 56px); }
  #sidebar {
    width: 220px; flex-shrink: 0; padding: 14px 10px; border-right: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 2px;
  }
  .navlbl { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); padding: 12px 10px 4px; }
  .navitem {
    display: flex; align-items: center; gap: 9px; width: 100%;
    padding: 8px 10px; border-radius: var(--r-md); font-size: 13.5px; font-weight: 500;
    color: var(--text-2); text-align: left;
  }
  .navitem:hover { background: var(--panel-2); color: var(--text); }
  .navitem.active { background: var(--accent-soft); color: var(--text); box-shadow: inset 0 0 0 1px var(--accent-ring); }
  .navitem .badge {
    margin-left: auto; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 99px;
    background: var(--danger); color: #fff; font-size: 10.5px; font-weight: 700;
    display: grid; place-items: center;
  }
  #main { flex: 1; padding: 20px 22px 60px; max-width: 1060px; min-width: 0; }
  h1.viewtitle { font-size: 20px; margin: 0 0 4px; letter-spacing: -.02em; }
  .viewsub { color: var(--muted); font-size: 13px; margin: 0 0 18px; line-height: 1.5; }
  h2.sec { font-size: 14px; font-weight: 700; margin: 26px 0 10px; display: flex; align-items: center; gap: 8px; }
  h2.sec .count { color: var(--muted); font-weight: 500; }

  /* ============ CARDS & PIECES ============ */
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 14px 16px; box-shadow: var(--shadow-sm); margin-bottom: 10px;
  }
  .prodgroup { margin-bottom: 18px; }
  .prodhead { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .prodimg {
    width: 52px; height: 52px; border-radius: var(--r-md); flex-shrink: 0;
    background: var(--panel-2); border: 1px solid var(--line);
    display: grid; place-items: center; font-size: 28px; overflow: hidden;
  }
  .prodimg img { width: 100%; height: 100%; object-fit: cover; }
  .prodimg.lg { width: 64px; height: 64px; font-size: 34px; }
  .offer {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 10px 14px; margin-bottom: 6px;
  }
  .offer .grow { flex: 1; min-width: 160px; }
  .price { font-weight: 700; font-size: 16px; }
  .price small { font-weight: 500; color: var(--muted); font-size: 11.5px; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px;
    font-size: 11px; font-weight: 600; border: 1px solid var(--line); color: var(--text-2);
    background: var(--panel-2);
  }
  .chip.ok { color: var(--ok); border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.08); }
  .chip.warn { color: var(--warn); border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.08); }
  .chip.danger { color: var(--danger); border-color: rgba(239,68,68,.35); background: rgba(239,68,68,.08); }
  .chip.accent { color: var(--accent); border-color: var(--accent-ring); background: var(--accent-soft); }
  .chip.violet { color: var(--violet); border-color: rgba(139,92,246,.35); background: rgba(139,92,246,.08); }
  .chip.gold { color: var(--gold); border-color: rgba(251,191,36,.4); background: rgba(251,191,36,.08); }
  .stars { color: var(--gold); font-size: 12px; letter-spacing: 1px; }
  .who { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .who .avatar {
    width: 26px; height: 26px; border-radius: 8px; background: var(--panel-2);
    border: 1px solid var(--line); display: grid; place-items: center; font-size: 14px; flex-shrink: 0;
  }
  .who .nm { font-weight: 600; font-size: 13px; }
  .who .sub { font-size: 11px; color: var(--muted); }
  .meta { font-size: 12px; color: var(--muted); }
  .meta b { color: var(--text-2); font-weight: 600; }

  .locked { position: relative; overflow: hidden; }
  .blurred { filter: blur(5px); user-select: none; pointer-events: none; }
  .locktag { position: absolute; top: 10px; right: 12px; font-size: 16px; }

  .sponsoredstrip {
    display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 18px;
  }
  .adcard {
    min-width: 230px; background: linear-gradient(180deg, var(--accent-soft), transparent), var(--panel);
    border: 1px solid var(--accent-ring); border-radius: var(--r-lg); padding: 12px 14px;
    cursor: pointer;
  }

  .timeline { list-style: none; margin: 8px 0 0; padding: 0; font-size: 12px; color: var(--muted); }
  .timeline li { padding: 3px 0 3px 16px; position: relative; }
  .timeline li::before { content: ''; position: absolute; left: 2px; top: 9px; width: 6px; height: 6px; border-radius: 99px; background: var(--accent); }

  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .row.between { justify-content: space-between; }
  .stack { display: flex; flex-direction: column; gap: 4px; }
  .grid2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
  .fld { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .fld label { font-size: 11.5px; font-weight: 600; color: var(--muted); }
  .hr { border: 0; border-top: 1px solid var(--line-soft); margin: 12px 0; }

  /* messages */
  .thread { max-height: 420px; overflow-y: auto; padding: 6px 2px; }
  .msg { max-width: 78%; margin-bottom: 8px; }
  .msg .bubble {
    padding: 8px 12px; border-radius: 14px; font-size: 13.5px; line-height: 1.45;
    background: var(--panel-2); border: 1px solid var(--line);
  }
  .msg.mine { margin-left: auto; }
  .msg.mine .bubble { background: var(--accent-soft); border-color: var(--accent-ring); }
  .msg .msub { font-size: 10.5px; color: var(--muted); margin: 3px 6px 0; }
  .msg .flag { color: var(--danger); font-size: 11px; font-weight: 600; }
  .redacted { background: rgba(239,68,68,.12); color: var(--danger); border-radius: 4px; padding: 0 4px; font-size: 12px; font-weight: 600; }

  /* modal */
  #modalwrap {
    position: fixed; inset: 0; background: rgba(5,8,14,.6); backdrop-filter: blur(4px);
    display: none; place-items: center; z-index: 100; padding: 16px;
  }
  #modalwrap.open { display: grid; }
  #modal {
    width: min(560px, 100%); max-height: 88vh; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-xl);
    padding: 20px 22px; box-shadow: var(--shadow-lg);
  }
  #modal h3 { margin: 0 0 4px; font-size: 17px; }
  #modal .msub { color: var(--muted); font-size: 12.5px; margin: 0 0 14px; line-height: 1.5; }

  /* toast */
  #toasts { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 9px 16px; font-size: 13px; box-shadow: var(--shadow-lg);
    animation: toastin .25s var(--ease);
  }
  @keyframes toastin { from { opacity: 0; transform: translateY(8px); } }

  .empty { color: var(--muted); font-size: 13px; padding: 18px; text-align: center; border: 1px dashed var(--line); border-radius: var(--r-lg); }
  .starpick { font-size: 26px; cursor: pointer; letter-spacing: 4px; user-select: none; }
  .starpick span { opacity: .3; transition: opacity .1s; }
  .starpick span.on { opacity: 1; }

  .ledgerrow { display: flex; justify-content: space-between; gap: 10px; padding: 8px 4px; border-bottom: 1px solid var(--line-soft); font-size: 13px; }
  .amt.pos { color: var(--ok); font-weight: 600; }
  .amt.neg { color: var(--danger); font-weight: 600; }

  @media (max-width: 760px) {
    #shell { flex-direction: column; }
    #sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; border-right: 0; border-bottom: 1px solid var(--line); padding: 8px; }
    .navlbl { display: none; }
    .navitem { width: auto; padding: 6px 10px; font-size: 12.5px; }
    #main { padding: 14px 12px 60px; }
  }
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">
    <div class="logo">◈</div> TradeMesh <span class="proto">PROTOTYPE</span>
  </div>
  <div id="actingas">
    <span class="lbl">Acting as</span>
    <select id="whoami" onchange="switchAccount(this.value)"></select>
    <span class="rolechips" id="rolechips"></span>
  </div>
  <button class="btn small" onclick="openIntro()" title="How it works">❓ Guide</button>
  <button class="btn small" onclick="toggleTheme()" title="Theme">◐</button>
  <button class="btn small danger" onclick="resetDemo()" title="Reset demo data">↺ Reset</button>
</div>

<div id="shell">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>

<div id="modalwrap" onclick="if(event.target===this) closeModal()"><div id="modal"></div></div>
<div id="toasts"></div>

<script>
/* =====================================================================
   TradeMesh — broker-network marketplace prototype.
   Single file, no backend. All "server" logic is simulated client-side;
   the point is to pressure-test the relationship-graph mechanics:
   masked identities, approval gating, broker re-listing, order routing,
   escrow splits, relay messaging, ratings, sponsored listings.
   Sections: STATE / SEED, GRAPH HELPERS, RENDER, VIEWS, ACTIONS, MODALS.
   ===================================================================== */

const LS_KEY = 'trademesh.v1';
const PLATFORM_FEE = 0.03; // take rate on the retail hop

/* ============ STATE / SEED ============ */

let _uid = 100;
function uid(p) { return p + '_' + (++_uid) + Math.random().toString(36).slice(2, 6); }
const now = () => Date.now();
const DAY = 86400000;

function seed() {
  const t0 = now() - 9 * DAY;
  return {
    v: 1,
    uidBase: 100,
    accounts: [
      { id: 'a_atlas',    name: 'Atlas Foods LLC',     roles: ['seller'],           alias: 'Golden Harvest Wholesale', tagline: 'Mediterranean pantry staples, importer-direct', avatar: '🫒', verified: true },
      { id: 'a_meridian', name: 'Meridian Textiles',   roles: ['seller'],           alias: 'Loom & Thread Supply',     tagline: 'Woven goods, mill-direct',                      avatar: '🧵', verified: true },
      { id: 'a_pacific',  name: 'Pacific Goods Inc',   roles: ['seller', 'broker'], alias: 'Pacific Trade Partners',   tagline: 'Specialty food & bev sourcing',                 avatar: '🌊', verified: true, autoRoute: false },
      { id: 'a_nexus',    name: 'Nexus Trading',       roles: ['broker'],           alias: 'Nexus Sourcing Group',     tagline: 'Small-format wholesale, broken-case specialist', avatar: '🔗', verified: true, autoRoute: true },
      { id: 'a_sam',      name: "Sam's Corner Market", roles: ['buyer'],            alias: 'Neighborhood Grocer #2214', tagline: '', avatar: '🛒', verified: true },
      { id: 'a_river',    name: 'Riverside Deli',      roles: ['buyer'],            alias: 'Riverside Deli Co',        tagline: '', avatar: '🥪', verified: true },
    ],
    products: [
      { id: 'p_oil',    ownerId: 'a_atlas',    name: 'Organic Extra-Virgin Olive Oil 1L', category: 'Food & Beverage', img: '🫒', baseUnit: 'bottle', desc: 'Cold-pressed, single-estate, current harvest. 12-bottle inner cases.' },
      { id: 'p_tom',    ownerId: 'a_atlas',    name: 'San Marzano Crushed Tomatoes 28oz', category: 'Food & Beverage', img: '🍅', baseUnit: 'can',    desc: 'DOP-certified, 24-can inner cases.' },
      { id: 'p_towel',  ownerId: 'a_meridian', name: 'Turkish Cotton Bath Towels',        category: 'Textiles',        img: '🧵', baseUnit: 'towel',  desc: '600 GSM, hotel grade, white.' },
      { id: 'p_coffee', ownerId: 'a_pacific',  name: 'Single-Origin Arabica Beans 1kg',   category: 'Food & Beverage', img: '☕', baseUnit: 'bag',    desc: 'Huila, Colombia. Medium roast, whole bean.' },
    ],
    listings: [
      // source listings (seller channels)
      { id: 'l_oil_src', ownerId: 'a_atlas',    productId: 'p_oil',    sourceId: null, unit: 'pallet', unitContains: 720,  price: 2880, moq: 1,  stock: 14,  active: true, negotiable: true, teaser: true,  sponsored: false, adStats: { imp: 0, clicks: 0 } },
      { id: 'l_tom_src', ownerId: 'a_atlas',    productId: 'p_tom',    sourceId: null, unit: 'pallet', unitContains: 1536, price: 2304, moq: 1,  stock: 9,   active: true, negotiable: true, teaser: true,  sponsored: false, adStats: { imp: 0, clicks: 0 } },
      { id: 'l_twl_src', ownerId: 'a_meridian', productId: 'p_towel',  sourceId: null, unit: 'carton', unitContains: 48,   price: 336,  moq: 5,  stock: 120, active: true, negotiable: true, teaser: true,  sponsored: false, adStats: { imp: 0, clicks: 0 } },
      { id: 'l_cof_src', ownerId: 'a_pacific',  productId: 'p_coffee', sourceId: null, unit: 'pallet', unitContains: 100,  price: 950,  moq: 1,  stock: 22,  active: true, negotiable: true, teaser: true,  sponsored: false, adStats: { imp: 0, clicks: 0 } },
      // derived listings (broker channels)
      { id: 'l_oil_nx', ownerId: 'a_nexus',   productId: 'p_oil', sourceId: 'l_oil_src', unit: 'case', unitContains: 12, price: 69, moq: 5,  heldStock: 40, active: true, negotiable: true, teaser: true, sponsored: true,  adStats: { imp: 132, clicks: 9 } },
      { id: 'l_oil_pc', ownerId: 'a_pacific', productId: 'p_oil', sourceId: 'l_oil_src', unit: 'case', unitContains: 12, price: 66, moq: 10, heldStock: 0,  active: true, negotiable: true, teaser: true, sponsored: false, adStats: { imp: 0, clicks: 0 } },
      { id: 'l_tom_nx', ownerId: 'a_nexus',   productId: 'p_tom', sourceId: 'l_tom_src', unit: 'case', unitContains: 24, price: 44, moq: 10, heldStock: 54, active: true, negotiable: true, teaser: true, sponsored: false, adStats: { imp: 0, clicks: 0 } },
    ],
    rels: [
      // seller → broker
      { id: 'r1', grantorId: 'a_atlas',    granteeId: 'a_nexus',   kind: 'broker', status: 'approved', requestedBy: 'a_nexus',   terms: { comm: 'relay',  reveal: false, priceFloor: 5,    minVolume: '1 pallet upstream' } },
      { id: 'r2', grantorId: 'a_atlas',    granteeId: 'a_pacific', kind: 'broker', status: 'approved', requestedBy: 'a_pacific', terms: { comm: 'direct', reveal: true,  priceFloor: 5,    minVolume: '' } },
      { id: 'r3', grantorId: 'a_meridian', granteeId: 'a_nexus',   kind: 'broker', status: 'pending',  requestedBy: 'a_nexus',   terms: { comm: 'relay',  reveal: false, priceFloor: null, minVolume: '' } },
      // channel → buyer
      { id: 'r4', grantorId: 'a_atlas',    granteeId: 'a_river', kind: 'buyer', status: 'approved', requestedBy: 'a_atlas',  terms: { comm: 'direct', reveal: false, priceFloor: null, minVolume: '' } },
      { id: 'r5', grantorId: 'a_meridian', granteeId: 'a_river', kind: 'buyer', status: 'approved', requestedBy: 'a_river',  terms: { comm: 'direct', reveal: false, priceFloor: null, minVolume: '' } },
      { id: 'r6', grantorId: 'a_nexus',    granteeId: 'a_sam',   kind: 'buyer', status: 'approved', requestedBy: 'a_nexus',  terms: { comm: 'relay',  reveal: false, priceFloor: null, minVolume: '' } },
      { id: 'r7', grantorId: 'a_pacific',  granteeId: 'a_sam',   kind: 'buyer', status: 'approved', requestedBy: 'a_sam',    terms: { comm: 'relay',  reveal: false, priceFloor: null, minVolume: '' } },
    ],
    negotiations: [
      { id: 'n1', listingId: 'l_oil_nx', buyerId: 'a_sam', status: 'countered', qty: 20, price: 65,
        history: [
          { by: 'a_sam',   qty: 20, price: 62, note: 'Standing weekly order if the price works.', at: t0 + 6 * DAY },
          { by: 'a_nexus', qty: 20, price: 65, note: 'Best I can do at this volume — can hold it for 30 days.', at: t0 + 6.2 * DAY },
        ] },
    ],
    orders: [

let state = load();
function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const s = JSON.parse(raw); _uid = s.uidBase || 500;
      // one-time migration to the Ledger skin: light becomes the default
      if (!s.ledgerSkin) { s.ledgerSkin = 1; s.session.theme = 'light'; }
      return s;
    }
  } catch (e) {}
  return seed();
}
function save() { state.uidBase = _uid; localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function resetDemo() {
  if (!confirm('Reset all demo data back to the seed scenario?')) return;
  localStorage.removeItem(LS_KEY); state = seed(); save(); render();
  toast('Demo reset');
}

/* ============ GRAPH HELPERS ============ */

const acc     = id => state.accounts.find(a => a.id === id);
const product = id => state.products.find(p => p.id === id);
const listing = id => state.listings.find(l => l.id === id);
const order   = id => state.orders.find(o => o.id === id);
const me      = () => acc(state.session.actingAs);

function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function money(n) { return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function ago(t) {
  const d = now() - t;
  if (d < 3600000) return Math.max(1, Math.round(d / 60000)) + 'm ago';
  if (d < DAY) return Math.round(d / 3600000) + 'h ago';
  return Math.round(d / DAY) + 'd ago';
}

// relationship lookup (any status)
function rel(grantorId, granteeId, kind) {
  return state.rels.find(r => r.grantorId === grantorId && r.granteeId === granteeId && r.kind === kind && r.status !== 'revoked');
}
function approved(grantorId, granteeId, kind) {
  const r = rel(grantorId, granteeId, kind);
  return r && r.status === 'approved' ? r : null;
}

// Is real identity revealed between these two accounts?
// Reveal is a term on any approved edge between them, either direction.
function revealed(idA, idB) {
  return state.rels.some(r => r.status === 'approved' && r.terms.reveal &&
    ((r.grantorId === idA && r.granteeId === idB) || (r.grantorId === idB && r.granteeId === idA)));
}

// rating of an account's storefront (all roles) → {avg, count}
function ratingOf(accountId) {
  const rs = state.reviews.filter(r => r.targetId === accountId);
  if (!rs.length) return { avg: null, count: 0 };
  return { avg: rs.reduce((s, r) => s + r.stars, 0) / rs.length, count: rs.length };
}
function starsHtml(accountId) {
  const { avg, count } = ratingOf(accountId);
  if (!avg) return '<span class="meta">no ratings yet</span>';
  return `<span class="stars">★</span> <b style="font-size:12px">${avg.toFixed(1)}</b> <span class="meta">(${count})</span>`;
}

// Masked-identity renderer. Viewers see the storefront alias unless
// they ARE the account or an approved edge has reveal=true.
function who(accountId, opts = {}) {
  const a = acc(accountId); if (!a) return '?';
  const viewer = me();
  const self = viewer.id === accountId;
  const show = self || revealed(viewer.id, accountId);
  const name = show ? a.name : a.alias;
  const sub = self ? 'you · ' + a.alias
            : show ? 'identity revealed · trades as “' + a.alias + '”'
            : (a.verified ? 'Verified business · identity masked' : 'identity masked');
  return `<span class="who"><span class="avatar">${a.avatar}</span><span class="stack" style="gap:0">
    <span class="nm">${esc(name)}</span>
    ${opts.nosub ? '' : `<span class="sub">${esc(sub)}${opts.stars === false ? '' : ' · '}</span>`}
  </span>${opts.stars === false ? '' : starsHtml(accountId)}</span>`;
}

// channels (accounts) that have approved this buyer
function myChannels(buyerId) {
  return state.rels.filter(r => r.kind === 'buyer' && r.granteeId === buyerId && r.status === 'approved').map(r => r.grantorId);
}
// listings a buyer can actually buy
function visibleListings(buyerId) {
  const ch = myChannels(buyerId);
  return state.listings.filter(l => l.active && ch.includes(l.ownerId) && l.ownerId !== buyerId);
}
// teaser listings: visible-as-locked to this buyer.
// DISCOVERY SHIELD: a broker's suppliers are invisible to that broker's buyers
// unless the broker lifts the shield (rel.share). Most protective setting wins.
function teaserListings(buyerId) {
  const ch = myChannels(buyerId);
  const myBrokers = ch.filter(cid => (acc(cid).roles || []).includes('broker'));
  return state.listings.filter(l => {
    if (!(l.active && l.teaser && !ch.includes(l.ownerId) && l.ownerId !== buyerId)) return false;
    if (!l.sourceId) {
      const shielded = myBrokers.some(b => {
        const e = approved(l.ownerId, b, 'broker');
        return e && !e.share;
      });
      if (shielded) return false;
    }
    return true;
  });
}

// BAND PARTITION: when a buyer has BOTH a direct seller channel and a broker
// channel for the same product, the broker serves only below one seller-unit
// (e.g. cases up to just under a pallet); the seller's band is the seller's.
// Returns the max qty a buyer may order on a derived listing, or null = no cap.
function bandCapFor(l, buyerId) {
  if (!l.sourceId) return null;
  const s = sourceOf(l); if (!s) return null;
  const r = approved(s.ownerId, buyerId, 'buyer');
  if (!r) return null;
  if ((r.excluded || []).includes(l.productId)) return null; // buyer dropped direct for this item
  return Math.ceil(s.unitContains / l.unitContains) - 1;
}
// Relationship precedence beats price: an offer that can't serve below the
// seller's band is suppressed entirely, even if cheaper.
function offerSuppressed(l, buyerId) {
  const cap = bandCapFor(l, buyerId);
  return cap !== null && (cap < 1 || l.moq > cap);
}
function directEdgeFor(buyerId, productId) {
  const p = product(productId); if (!p) return null;
  return approved(p.ownerId, buyerId, 'buyer');
}

// VOLUME FEE TIERS: broker/seller platform fee on retail hops steps down with
// delivered retail volume — productive intermediaries keep more margin.
function feeRateFor(accountId) {
  const vol = state.orders
    .filter(o => o.ownerId === accountId && o.status === 'delivered' && !o.downstreamId)
    .reduce((s, o) => s + o.total, 0);
  return vol >= 50000 ? 0.02 : vol >= 10000 ? 0.025 : 0.03;
}
// derived-listing economics
function sourceOf(l) { return l.sourceId ? listing(l.sourceId) : null; }
function costBasisPerUnit(l) {
  const s = sourceOf(l); if (!s) return null;
  return (s.price / s.unitContains) * l.unitContains;
}
function availableUnits(l) {
  const s = sourceOf(l);
  if (!s) return l.stock;
  return (l.heldStock || 0) + Math.floor((s.stock * s.unitContains) / l.unitContains);
}
function pricePerBase(l) { return l.price / l.unitContains; }

// accepted negotiation for buyer+listing, if any
function acceptedNego(buyerId, listingId) {
  return state.negotiations.find(n => n.buyerId === buyerId && n.listingId === listingId && n.status === 'accepted');
}

// Upwork-style contact filter
function maskContacts(text) {
  let flagged = false;
  let out = text
    .replace(/[\w.+-]+@[\w-]+\.[\w.-]+/g, () => { flagged = true; return '[contact info removed]'; })
    .replace(/(https?:\/\/|www\.)\S+/gi,   () => { flagged = true; return '[link removed]'; })
    .replace(/\+?\d[\d\s().-]{7,}\d/g,     () => { flagged = true; return '[contact info removed]'; });
  return { text: out, flagged };
}
function renderMsgText(t) {
  return esc(t).replace(/\[contact info removed\]|\[link removed\]/g, m => `<span class="redacted">${m}</span>`);
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function badgeOrders() {
  const m = me().id;
  return state.orders.filter(o =>
    (o.ownerId === m && (o.status === 'placed')) ||
    (o.buyerId === m && o.status === 'shipped')).length || null;

function badgeSources() {
  return null;
}

/* ============ VIEW: MARKETPLACE (buyer) ============ */

function countAdImpressions() {
  visibleListings(me().id).filter(l => l.sponsored).forEach(l => { l.adStats.imp++; });
}

function offerRow(l, opts = {}) {
  const p = product(l.productId);
  const nego = acceptedNego(me().id, l.id);
  const effPrice = nego ? nego.price : l.price;
  const cap = bandCapFor(l, me().id);
  const avail = cap !== null ? Math.min(availableUnits(l), cap) : availableUnits(l);
  const s = l.sourceId ? sourceOf(l) : null;
  const bandChip = cap !== null && s
    ? `<span class="chip violet" title="Your direct supplier channel covers ${s.moq}+ ${esc(s.unit)}s">band: under 1 ${esc(s.unit)}</span>`
    : (opts.directBand && !l.sourceId ? `<span class="chip accent">direct · ${l.moq} ${esc(l.unit)}+</span>` : '');
  return `<div class="offer">
    <div class="grow">${who(l.ownerId)}</div>
    <div class="stack" style="min-width:130px">
      <span class="meta"><b>${esc(l.unit)}</b> of ${l.unitContains} ${esc(p.baseUnit)}s ${bandChip}</span>
      <span class="meta">MOQ ${l.moq} · ${avail} available</span>
    </div>
    <div class="stack" style="min-width:120px">
      <span class="price">${money(effPrice)}<small> /${esc(l.unit)}</small></span>
      <span class="meta">${money(effPrice / l.unitContains)}/${esc(p.baseUnit)}
        ${nego ? '<span class="chip ok">negotiated</span>' : ''}</span>
    </div>
    <div class="row">
      <button class="btn primary small" onclick="openOrderModal('${l.id}')">Order</button>
      ${l.negotiable && !nego ? `<button class="btn small" onclick="openNegoModal('${l.id}')">Negotiate</button>` : ''}
      <button class="btn small" onclick="openThreadWith('${l.ownerId}','${esc(p.name)}')">Message</button>
      ${opts.canDropDirect ? `<button class="btn small" title="Remove this item from your direct channel so broker offers open up for all quantities" onclick="excludeItem('${l.productId}')">Use brokers instead</button>` : ''}
    </div>
  </div>`;
}

function vMarket() {
  const m = me();
  const vis = visibleListings(m.id);
  const sponsored = vis.filter(l => l.sponsored && !offerSuppressed(l, m.id));
  // group by product
  const byProd = {};
  vis.forEach(l => { (byProd[l.productId] = byProd[l.productId] || []).push(l); });
  const teasers = teaserListings(m.id);

  let html = `<h1 class="viewtitle">Marketplace</h1>
  <p class="viewsub">You only see listings from channels that approved you. Sellers and brokers look identical from here — every storefront is a masked alias. The same product can appear from several channels at different units and prices; pick your counterparty.</p>`;

  if (sponsored.length) {
    html += `<div class="sponsoredstrip">` + sponsored.map(l => {
      const p = product(l.productId);
      return `<div class="adcard" onclick="adClick('${l.id}')">
        <div class="row between"><span class="chip gold">Sponsored</span><span class="meta">${esc(acc(l.ownerId).alias)}</span></div>
        <div class="row" style="margin-top:8px"><span class="prodimg">${p.img.startsWith('data:') ? `<img src="${p.img}">` : p.img}</span>
        <div class="stack"><b style="font-size:13px">${esc(p.name)}</b>
        <span class="meta">${money(l.price)}/${esc(l.unit)} · MOQ ${l.moq}</span></div></div>
      </div>`;
    }).join('') + `</div>`;
  }

  const prods = Object.keys(byProd);
  if (!prods.length) html += `<div class="empty">No listings yet — you need a seller or broker to approve you or send an invite code (My Network → Redeem invite).</div>`;
  prods.forEach(pid => {
    const p = product(pid);
    const dr = directEdgeFor(m.id, pid);
    const excluded = dr && (dr.excluded || []).includes(pid);
    let offers = byProd[pid];
    if (excluded) offers = offers.filter(l => !(l.ownerId === p.ownerId && !l.sourceId));
    offers = offers.filter(l => !offerSuppressed(l, m.id));
    const hasBrokerAlt = offers.some(l => l.sourceId && sourceOf(l) && sourceOf(l).ownerId === p.ownerId);
    offers = offers.sort((a, b) => pricePerBase(a) - pricePerBase(b));
    const readdPending = dr && (dr.readd || []).includes(pid);
    html += `<div class="prodgroup">
      <div class="prodhead">
        <span class="prodimg lg">${p.img.startsWith('data:') ? `<img src="${p.img}">` : p.img}</span>
        <div class="stack" style="gap:2px">
          <b style="font-size:15px">${esc(p.name)}</b>
          <span class="meta">${esc(p.category)} · ${offers.length} offer${offers.length > 1 ? 's' : ''} in your network</span>
          <span class="meta">${esc(p.desc || '')}</span>
        </div>
      </div>
      ${offers.map(l => offerRow(l, {
        directBand: dr && !excluded && hasBrokerAlt,
        canDropDirect: dr && !excluded && hasBrokerAlt && l.ownerId === p.ownerId && !l.sourceId,
      })).join('')}
      ${excluded ? `<div class="offer"><span class="meta">You removed this item from your direct supplier channel — broker offers are open for all quantities. Restoring direct is at the seller's discretion.</span>
        ${readdPending ? '<span class="chip warn">re-add requested — pending seller approval</span>'
                       : `<button class="btn small" onclick="requestReadd('${pid}')">Request re-add</button>`}</div>` : ''}
    </div>`;
  });

  if (teasers.length) {
    html += `<h2 class="sec">🔒 In the network, not in yours yet <span class="count">(${teasers.length})</span></h2>
    <p class="viewsub">These channels haven't approved you. You can see that something exists — not the details, not the identity. Request access and the channel owner decides.</p>
    <div class="grid2">` + teasers.map(l => {
      const p = product(l.productId);
      const pending = rel(l.ownerId, me().id, 'buyer');
      return `<div class="card locked">
        <span class="locktag">🔒</span>
        <div class="row">
          <span class="prodimg blurred">${p.img.startsWith('data:') ? `<img src="${p.img}">` : p.img}</span>
          <div class="stack" style="gap:2px">
            <b class="blurred" style="font-size:14px">${esc(p.name)}</b>
            <span class="meta">${esc(p.category)} · sold by <b>${esc(l.unit)}</b></span>
            <span class="meta">${esc(acc(l.ownerId).alias)} · ${starsHtml(l.ownerId)}</span>
          </div>
        </div>
        <div class="row" style="margin-top:10px">
          ${pending ? `<span class="chip warn">Access requested — pending</span>`
                    : `<button class="btn small primary" onclick="requestAccess('${l.ownerId}')">Request access</button>`}
        </div>
      </div>`;
    }).join('') + `</div>`;
  }
  return html;
}

function adClick(listingId) {
  const l = listing(listingId); l.adStats.clicks++;
  openOrderModal(listingId);
}

function requestAccess(channelId) {
  state.rels.push({ id: uid('r'), grantorId: channelId, granteeId: me().id, kind: 'buyer', status: 'pending', requestedBy: me().id,
    terms: { comm: 'relay', reveal: false, priceFloor: null, minVolume: '' } });
  toast('Access requested — the channel owner will review your trade profile');
  render();
}

/* ---- channel precedence actions ---- */
function excludeItem(productId) {
  const r = directEdgeFor(me().id, productId); if (!r) return;
  if (!confirm('Remove this item from your direct supplier channel? Broker offers open up for all quantities — but getting the direct channel back for this item is at the seller’s discretion.')) return;
  r.excluded = r.excluded || [];
  if (!r.excluded.includes(productId)) r.excluded.push(productId);
  toast('Item moved to broker channels — direct restore requires seller approval');
  render();
}
function requestReadd(productId) {
  const r = directEdgeFor(me().id, productId); if (!r) return;
  r.readd = r.readd || [];
  if (!r.readd.includes(productId)) r.readd.push(productId);
  toast('Re-add requested — at the seller’s discretion');
  render();
}
function approveReadd(relId, productId) {
  const r = state.rels.find(x => x.id === relId); if (!r) return;
  r.excluded = (r.excluded || []).filter(p => p !== productId);
  r.readd = (r.readd || []).filter(p => p !== productId);
  toast('Direct channel restored for this item');
  render();
}

/* ---- order actions ---- */

function placeOrder(listingId, qty) {
  const l = listing(listingId); const m = me();
  const nego = acceptedNego(m.id, l.id);
  const unitPrice = nego ? nego.price : l.price;
  const total = unitPrice * qty;
  const o = {
    id: uid('o'), buyerId: m.id, ownerId: l.ownerId, listingId: l.id, qty, unitPrice, total,
    status: 'placed', upstreamId: null, downstreamId: null, fulfilledFromStock: false,
    ratedByBuyer: false, ratedByOwner: false,
    timeline: [{ at: now(), text: `Order placed — ${money(total)} paid into escrow` }],
  };
  state.orders.push(o);
  state.ledger.push({ id: uid('lg'), orderId: o.id, accountId: m.id, type: 'escrow_out', amount: -total, note: 'Payment into escrow · order ' + o.id, at: now() });
  if (nego) { nego.status = 'used'; }
  // auto-routing for derived listings when broker has autoRoute on
  const ownerAcc = acc(l.ownerId);
  if (l.sourceId && ownerAcc.autoRoute) {
    routeOrderCore(o, true);
  }
  closeModal(); render();
  toast('Order placed & paid into escrow');
}

// Broker routing: consume held stock first, buy whole source units for the rest.
function routeOrderCore(o, auto) {
  const l = listing(o.listingId); const s = sourceOf(l);
  const held = l.heldStock || 0;
  const fromStock = Math.min(held, o.qty);
  const remaining = o.qty - fromStock;
  if (remaining <= 0) { return fulfillFromStockCore(o, auto); }
  const packs = Math.ceil((remaining * l.unitContains) / s.unitContains);
  if (s.stock < packs) { toast('Supplier is out of stock for this quantity'); return; }
  s.stock -= packs;
  const acquiredUnits = Math.floor((packs * s.unitContains) / l.unitContains);
  l.heldStock = held - fromStock + (acquiredUnits - remaining);
  const upTotal = packs * s.price;
  const up = {
    id: uid('o'), buyerId: l.ownerId, ownerId: s.ownerId, listingId: s.id, qty: packs, unitPrice: s.price, total: upTotal,
    status: 'placed', upstreamId: null, downstreamId: o.id, fulfilledFromStock: false,
    ratedByBuyer: false, ratedByOwner: false,
    timeline: [{ at: now(), text: `Upstream PO created for downstream order #${o.id} — ${money(upTotal)} in escrow` }],
  };
  state.orders.push(up);
  o.upstreamId = up.id;
  o.status = 'routed';
  o.timeline.push({ at: now(), text: (auto ? 'Auto-routed' : 'Routed') + `: upstream PO ${up.id} sent to supplier (${packs} ${s.unit}${packs > 1 ? 's' : ''}; ${acquiredUnits - remaining} ${l.unit}s go to your held stock)` });
  state.ledger.push({ id: uid('lg'), orderId: up.id, accountId: l.ownerId, type: 'escrow_out', amount: -upTotal, note: 'Upstream PO payment into escrow · order ' + up.id, at: now() });
}
function routeToSupplier(orderId) { const o = order(orderId); routeOrderCore(o, false); render(); }

function fulfillFromStockCore(o, auto) {
  const l = listing(o.listingId);
  l.heldStock -= o.qty;
  o.fulfilledFromStock = true;
  o.status = 'confirmed';
  o.timeline.push({ at: now(), text: (auto ? 'Auto-confirmed' : 'Confirmed') + ' — fulfilling from broker held stock (' + l.heldStock + ' remaining)' });
}
function fulfillFromStock(orderId) { const o = order(orderId); fulfillFromStockCore(o, false); render(); toast('Fulfilling from your held stock'); }

function confirmOrder(orderId) {
  const o = order(orderId);
  const l = listing(o.listingId);
  if (!l.sourceId && !o.downstreamId) { l.stock -= o.qty; } // direct sale consumes source stock
  if (o.downstreamId) { /* upstream PO stock already decremented at routing time */ }
  o.status = 'confirmed';
  o.timeline.push({ at: now(), text: 'Confirmed by ' + (o.downstreamId ? 'supplier' : 'seller') });
  const down = o.downstreamId ? order(o.downstreamId) : null;
  if (down) { down.status = 'confirmed'; down.timeline.push({ at: now(), text: 'Supplier confirmed the upstream PO' }); }
  render();
}

function shipOrder(orderId) {
  const o = order(orderId);
  o.status = 'shipped';
  const down = o.downstreamId ? order(o.downstreamId) : null;
  o.timeline.push({ at: now(), text: down ? `Shipped — blind drop-ship, label branded “${acc(down.ownerId).alias}”, end-buyer address injected by platform` : 'Shipped' });
  if (down) {
    down.status = 'shipped';
    down.timeline.push({ at: now(), text: 'Shipped by your storefront (drop-shipped from supplier under your branding)' });
  }
  render(); toast('Marked shipped');
}

function confirmDelivery(orderId) {
  const o = order(orderId);
  o.status = 'delivered';
  o.timeline.push({ at: now(), text: 'Delivery confirmed by buyer — escrow released' });
  releaseEscrow(o);
  // if this was an upstream PO, the downstream broker order doesn't auto-deliver;
  // if this is a downstream order with an upstream PO still open, settle that too.
  const up = o.upstreamId ? order(o.upstreamId) : null;
  if (up && up.status === 'shipped') {
    up.status = 'delivered';
    up.timeline.push({ at: now(), text: 'Downstream delivery confirmed — upstream escrow released' });
    releaseEscrow(up);
  }
  render(); toast('Delivery confirmed — payouts released');
  const l = listing(o.listingId);
  if (!o.downstreamId) setTimeout(() => openRateModal(o.id, 'counterparty'), 350);
}

// escrow release: platform fee on retail (non-PO) hops at the owner's volume
// tier; full release on PO hops (wholesale hops are free at launch)
function releaseEscrow(o) {
  const isPO = !!o.downstreamId;
  const rate = feeRateFor(o.ownerId);
  const fee = isPO ? 0 : +(o.total * rate).toFixed(2);
  const net = +(o.total - fee).toFixed(2);
  state.ledger.push({ id: uid('lg'), orderId: o.id, accountId: o.ownerId, type: 'payout', amount: net,
    note: `Escrow release · order ${o.id}` + (fee ? ` (net of ${(rate * 100).toFixed(1)}% platform fee ${money(fee)})` : ' (wholesale hop — no fee)'), at: now() });
}

/* ============ VIEW: MESSAGES ============ */

function myThreads() {
  const m = me().id;
  return state.threads.filter(t => t.aId === m || t.bId === m);
}

function vMessages() {
  const m = me();
  const ths = myThreads();
  const open = state.session.openThread ? state.threads.find(t => t.id === state.session.openThread) : null;

  let html = `<h1 class="viewtitle">Messages</h1>
  <p class="viewsub">All communication stays on-platform. Emails, phone numbers and links are stripped and flagged automatically. On relay channels, the middleman forwards questions upstream without exposing either side.</p>`;

  if (!ths.length) return html + '<div class="empty">No conversations yet — hit “Message” on any listing or order.</div>';

  if (!open) {
    html += ths.map(t => {
      const other = t.aId === m.id ? t.bId : t.aId;
      const last = t.messages[t.messages.length - 1];
      return `<div class="card" style="cursor:pointer" onclick="openThreadById('${t.id}')">
        <div class="row between">
          ${who(other, { stars: false })}
          <span class="meta">${last ? ago(last.at) : ''}</span>
        </div>
        <div class="meta" style="margin-top:6px">${t.relay ? '<span class="chip violet">relay channel</span> ' : ''}Re: ${esc(t.contextLabel)} — ${last ? esc(last.text.slice(0, 80)) : 'no messages'}</div>
      </div>`;
    }).join('');
    return html;
  }

  const other = open.aId === m.id ? open.bId : open.aId;
  // relay controls: if I'm a broker in this thread and I have a supplier for the discussed context
  const linked = open.linkedThreadId ? state.threads.find(t => t.id === open.linkedThreadId) : null;
  const directIntroAvailable = canIntroduceDirect(open);

  html += `<button class="btn small" onclick="state.session.openThread=null;render()">← All conversations</button>
  <div class="card" style="margin-top:10px">
    <div class="row between">
      ${who(other)}
      <span class="row">
        ${open.relay ? '<span class="chip violet">relay channel — middleman controls upstream</span>' : ''}
        ${directIntroAvailable ? `<button class="btn small" onclick="introduceDirect('${open.id}')">🔓 Introduce buyer & supplier directly</button>` : ''}
      </span>
    </div>
    <div class="meta" style="margin:4px 0 8px">Re: ${esc(open.contextLabel)}</div>
    <div class="thread">` +
    open.messages.map((msg, i) => `
      <div class="msg ${msg.from === m.id ? 'mine' : ''}">
        <div class="bubble">${renderMsgText(msg.text)}</div>
        <div class="msub">${msg.from === m.id ? 'You' : esc(acc(msg.from).alias)} · ${ago(msg.at)}
          ${msg.flagged ? '<span class="flag">⚑ contact info removed & flagged</span>' : ''}
          ${msg.relayed ? '<span class="chip violet" style="font-size:9.5px">relayed</span>' : ''}
          ${canRelay(open, msg) ? `<button class="btn small" style="margin-left:6px" onclick="relayMessage('${open.id}',${i})">⇪ Relay ${relayDirection(open)}</button>` : ''}
        </div>
      </div>`).join('') +
    `</div>
    <div class="row" style="margin-top:10px">
      <input id="msgbox" style="flex:1" placeholder="Write a message… (try including an email or phone number)" onkeydown="if(event.key==='Enter')sendMsg('${open.id}')">
      <button class="btn primary" onclick="sendMsg('${open.id}')">Send</button>
    </div>
  </div>`;
  return html;
}

function openThreadById(id) { state.session.openThread = id; render(); }

function openThreadWith(otherId, contextLabel) {
  const m = me().id;
  let t = state.threads.find(t => ((t.aId === m && t.bId === otherId) || (t.aId === otherId && t.bId === m)) && t.contextLabel === contextLabel);
  if (!t) {
    // relay if either side's buyer-edge terms say relay
    const r = approved(otherId, m, 'buyer') || approved(m, otherId, 'buyer');
    t = { id: uid('t'), aId: m, bId: otherId, relay: !!(r && r.terms.comm === 'relay'), contextLabel, linkedThreadId: null, messages: [] };
    state.threads.push(t);
  }
  state.session.openThread = t.id;
  state.session.view = 'messages';
  render();
}

function sendMsg(threadId) {
  const box = document.getElementById('msgbox');
  const raw = (box.value || '').trim(); if (!raw) return;
  const { text, flagged } = maskContacts(raw);
  const t = state.threads.find(x => x.id === threadId);
  t.messages.push({ from: me().id, text, flagged, at: now() });
  if (flagged) toast('⚑ Contact info removed — repeated attempts get accounts suspended');
  render();
}

// A broker in the middle can relay a buyer's message up to the supplier, or a supplier's answer back down.
function canRelay(t, msg) {
  const m = me();
  if (!m.roles.includes('broker') || msg.from === m.id) return false;
  const other = msg.from;
  // buyer → me: I can relay up if I have any approved supplier edge; supplier → me: relay down if linked thread exists
  const otherIsMyBuyer = !!approved(m.id, other, 'buyer');
  const otherIsMySupplier = !!approved(other, m.id, 'broker');
  return otherIsMyBuyer || (otherIsMySupplier && !!t.linkedThreadId);
}
function relayDirection(t) {
  const m = me();
  const other = t.aId === m.id ? t.bId : t.aId;
  return approved(m.id, other, 'buyer') ? 'to supplier' : 'to buyer';
}
function relayMessage(threadId, msgIdx) {
  const m = me();
  const t = state.threads.find(x => x.id === threadId);
  const msg = t.messages[msgIdx];
  const other = t.aId === m.id ? t.bId : t.aId;
  const otherIsMyBuyer = !!approved(m.id, other, 'buyer');

  if (otherIsMyBuyer) {
    // relay buyer question upstream: pick my supplier for this context (first approved supplier edge)
    const supEdge = state.rels.find(r => r.kind === 'broker' && r.granteeId === m.id && r.status === 'approved');
    if (!supEdge) { toast('No approved supplier to relay to'); return; }
    let up = t.linkedThreadId ? state.threads.find(x => x.id === t.linkedThreadId) : null;
    if (!up) {
      up = { id: uid('t'), aId: m.id, bId: supEdge.grantorId, relay: false, contextLabel: t.contextLabel, linkedThreadId: t.id, messages: [] };
      state.threads.push(up); t.linkedThreadId = up.id;
    }
    up.messages.push({ from: m.id, text: '⇪ Relayed from my buyer: “' + msg.text + '”', flagged: false, at: now(), relayed: true });
    toast('Relayed upstream — buyer identity stays masked');
  } else {
    // relay supplier answer downstream
    const down = state.threads.find(x => x.id === t.linkedThreadId);
    if (!down) { toast('No linked buyer thread'); return; }
    down.messages.push({ from: m.id, text: '⇩ From the supplier: “' + msg.text + '”', flagged: false, at: now(), relayed: true });
    toast('Relayed to buyer — supplier identity stays masked');
  }
  render();
}

// direct introduction: allowed only when the supplier's broker-edge terms permit direct comms
function canIntroduceDirect(t) {
  const m = me();
  if (!m.roles.includes('broker')) return false;
  const other = t.aId === m.id ? t.bId : t.aId;
  if (!approved(m.id, other, 'buyer')) return false; // other must be my buyer
  return state.rels.some(r => r.kind === 'broker' && r.granteeId === m.id && r.status === 'approved' && r.terms.comm === 'direct');
}
function introduceDirect(threadId) {
  const m = me();
  const t = state.threads.find(x => x.id === threadId);
  const buyerId = t.aId === m.id ? t.bId : t.aId;
  const supEdge = state.rels.find(r => r.kind === 'broker' && r.granteeId === m.id && r.status === 'approved' && r.terms.comm === 'direct');
  const nt = { id: uid('t'), aId: buyerId, bId: supEdge.grantorId, relay: false, contextLabel: t.contextLabel + ' (direct, introduced by ' + m.alias + ')', linkedThreadId: null, messages: [
    { from: m.id, text: 'Introduced buyer and supplier for direct discussion. Identities stay masked; orders still route through my channel.', flagged: false, at: now(), relayed: true },
  ] };
  state.threads.push(nt);
  toast('Direct thread opened between buyer and supplier (identities still masked)');
  render();
}

/* ============ VIEW: NETWORK ============ */

function relRow(r, iAmGrantor) {
  const otherId = iAmGrantor ? r.granteeId : r.grantorId;
  const t = r.terms;
  const termChips = `
    <span class="chip">${t.comm === 'relay' ? '🔁 relay comms' : '↔ direct comms'}</span>
    ${t.reveal ? '<span class="chip warn">identity revealed</span>' : '<span class="chip">masked</span>'}
    ${t.priceFloor ? `<span class="chip">floor ${money(t.priceFloor)}/base</span>` : ''}
    ${t.minVolume ? `<span class="chip">min ${esc(t.minVolume)}</span>` : ''}`;
  const buyerProfile = (!iAmGrantor || r.status !== 'pending') ? '' : (() => {
    const ordersCount = state.orders.filter(o => o.buyerId === otherId && o.status === 'delivered').length;
    return `<div class="meta" style="margin-top:6px">Trade profile: ${ordersCount} completed orders on platform · ${ratingOf(otherId).count} reviews</div>`;
  })();
  return `<div class="card">
    <div class="row between">
      <div class="row">${who(otherId)}
        <span class="chip ${r.status === 'approved' ? 'ok' : r.status === 'pending' ? 'warn' : 'danger'}">${r.status}${r.status === 'pending' && r.requestedBy === otherId ? ' — they requested' : r.status === 'pending' ? ' — you requested' : ''}</span>
      </div>
      <span class="row">
        ${iAmGrantor && r.status === 'pending' && r.requestedBy === otherId ? `
          <button class="btn primary small" onclick="approveRel('${r.id}')">Approve</button>
          <button class="btn small danger" onclick="declineRel('${r.id}')">Decline</button>` : ''}
        ${iAmGrantor && r.status === 'approved' ? `
          <button class="btn small" onclick="openTermsModal('${r.id}')">Terms</button>
          <button class="btn small danger" onclick="revokeRel('${r.id}')">Revoke</button>` : ''}
        ${!iAmGrantor && r.kind === 'broker' && r.status === 'approved' && me().roles.includes('broker') ? `
          <button class="btn small" title="Whether your buyers can discover this supplier exists" onclick="toggleShare('${r.id}')">${r.share ? '👁 discoverable by my buyers' : '🛡 shielded from my buyers'}</button>` : ''}
      </span>
    </div>
    <div class="row" style="margin-top:8px">${termChips} <span class="meta">· ${r.kind === 'broker' ? 'broker relationship' : 'buyer relationship'}${iAmGrantor ? ' · you set the terms' : ' · their terms apply to you'}</span></div>
    ${buyerProfile}
    ${iAmGrantor && r.kind === 'buyer' && ((r.excluded || []).length || (r.readd || []).length) ? `
      <div class="row" style="margin-top:8px">
        ${(r.excluded || []).filter(pid => !(r.readd || []).includes(pid)).map(pid => `<span class="chip">direct disabled: ${esc((product(pid) || {}).name || pid)}</span>`).join('')}
        ${(r.readd || []).map(pid => `<span class="row"><span class="chip warn">re-add request: ${esc((product(pid) || {}).name || pid)}</span>
          <button class="btn small primary" onclick="approveReadd('${r.id}','${pid}')">Approve</button>
          <button class="btn small danger" onclick="declineReadd('${r.id}','${pid}')">Decline</button></span>`).join('')}
      </div>` : ''}
  </div>`;
}

function approveRel(id) {
  const r = state.rels.find(x => x.id === id);
  r.status = 'approved';
  toast('Approved — terms are editable any time');
  openTermsModal(id);
}
function declineRel(id) {
  const r = state.rels.find(x => x.id === id);
  state.rels = state.rels.filter(x => x.id !== id);
  render(); toast('Request declined');
}
function revokeRel(id) {
  const r = state.rels.find(x => x.id === id);
  if (!confirm('Revoke this relationship? Broker re-listings sourced from you will be paused automatically.')) return;
  r.status = 'revoked';
  if (r.kind === 'broker') {
    state.listings.forEach(l => {
      if (l.ownerId === r.granteeId && l.sourceId && sourceOf(l) && sourceOf(l).ownerId === r.grantorId) l.active = false;
    });
  }
  render(); toast('Revoked — dependent listings paused');
}
function makeInvite() {
  const code = 'TM-' + Math.random().toString(36).slice(2, 6).toUpperCase();
  state.invites.push({ code, issuerId: me().id, usedBy: null });
  render(); toast('Invite code created: ' + code);
}
function redeemInvite() {
  const code = (document.getElementById('invitecode').value || '').trim().toUpperCase();
  const inv = state.invites.find(i => i.code === code && !i.usedBy);
  if (!inv) { toast('Invalid or used code'); return; }
  inv.usedBy = me().id;
  state.rels.push({ id: uid('r'), grantorId: inv.issuerId, granteeId: me().id, kind: 'buyer', status: 'approved', requestedBy: inv.issuerId,
    terms: { comm: 'relay', reveal: false, priceFloor: null, minVolume: '' } });
  render(); toast('Welcome — you can now buy from ' + acc(inv.issuerId).alias);
}

/* ============ VIEW: WALLET ============ */

function vWallet() {
  const m = me().id;
  const rows = state.ledger.filter(e => e.accountId === m).sort((a, b) => b.at - a.at);
  const bal = rows.reduce((s, e) => s + e.amount, 0);
  const escrowHeld = state.orders
    .filter(o => o.buyerId === m && ['placed', 'routed', 'confirmed', 'shipped'].includes(o.status))
    .reduce((s, o) => s + o.total, 0);
  const myRate = feeRateFor(m);
  const tierNote = (me().roles.includes('seller') || me().roles.includes('broker'))
    ? `<div class="card" style="margin-bottom:12px"><span class="meta">Your platform fee tier: <b>${(myRate * 100).toFixed(1)}%</b> on retail sales — steps down with delivered volume (3% base → 2.5% at $10k → 2% at $50k). Wholesale (broker→supplier) hops are fee-free: the platform rewards keeping brokers in the deal.</span></div>` : '';
  return `<h1 class="viewtitle">Wallet</h1>
  <p class="viewsub">Buyers pay the platform into escrow; payouts split automatically on delivery — supplier cost, broker margin, platform fee at your volume tier. Invoices are generated per hop with the right identities masked on each document.</p>
  ${tierNote}
  <div class="row" style="margin-bottom:16px">
    <div class="card" style="flex:1;margin:0"><div class="meta">Net flow (this demo)</div><div class="price" style="font-size:22px">${money(bal)}</div></div>
    <div class="card" style="flex:1;margin:0"><div class="meta">In escrow (your open purchases)</div><div class="price" style="font-size:22px">${money(escrowHeld)}</div></div>
  </div>` +
  (rows.map(e => `<div class="ledgerrow">
    <span>${esc(e.note)} <span class="meta">· ${ago(e.at)}</span></span>
    <span class="amt ${e.amount >= 0 ? 'pos' : 'neg'}">${e.amount >= 0 ? '+' : ''}${money(e.amount)}</span>
  </div>`).join('') || '<div class="empty">No transactions yet.</div>');
}

/* ============ MODALS ============ */

function openModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalwrap').classList.add('open');
}
function closeModal() { document.getElementById('modalwrap').classList.remove('open'); }

/* ---- order modal ---- */
function openOrderModal(listingId) {
  const l = listing(listingId); const p = product(l.productId);
  const nego = acceptedNego(me().id, l.id);
  const price = nego ? nego.price : l.price;
  const cap = bandCapFor(l, me().id);
  const avail = cap !== null ? Math.min(availableUnits(l), cap) : availableUnits(l);
  const s = l.sourceId ? sourceOf(l) : null;
  openModal(`<h3>Order — ${esc(p.name)}</h3>
  <p class="msub">Sold by ${esc(acc(l.ownerId).alias)} · ${esc(l.unit)} of ${l.unitContains} ${esc(p.baseUnit)}s ·
  ${money(price)}/${esc(l.unit)} ${nego ? '(your negotiated price)' : ''} · MOQ ${l.moq} · ${avail} available.
  ${cap !== null && s ? `This channel serves quantities under 1 ${esc(s.unit)} — for ${s.moq}+ ${esc(s.unit)}s, order on your direct supplier channel.` : ''}
  Payment goes into platform escrow and is released to your counterparty when you confirm delivery.</p>
  <div class="fld"><label>Quantity (${esc(l.unit)}s)</label>
    <input type="number" id="ordqty" value="${l.moq}" min="${l.moq}" max="${avail}" oninput="updOrdTotal('${l.id}')"></div>
  <div class="row between"><b id="ordtotal">${money(price * l.moq)}</b>
    <span class="row">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="submitOrder('${l.id}')">Place order & pay into escrow</button>
    </span></div>`);
}
function updOrdTotal(listingId) {
  const l = listing(listingId);
  const nego = acceptedNego(me().id, l.id);
  const price = nego ? nego.price : l.price;
  const q = parseInt(document.getElementById('ordqty').value) || 0;
  document.getElementById('ordtotal').textContent = money(price * q);
}
function submitOrder(listingId) {
  const l = listing(listingId);
  const q = parseInt(document.getElementById('ordqty').value) || 0;
  if (q < l.moq) { toast('Below this channel’s minimum (' + l.moq + ')'); return; }
  const cap = bandCapFor(l, me().id);
  if (cap !== null && q > cap) {
    const s = sourceOf(l);
    toast('Above this channel’s band — ' + s.moq + '+ ' + s.unit + 's are served by your direct supplier channel');
    return;
  }
  if (q > availableUnits(l)) { toast('Only ' + availableUnits(l) + ' available'); return; }
  placeOrder(listingId, q);
}

function submitCounter(negoId) {

  closeModal(); render(); toast('Counter sent');
}

/* ---- derive (broker re-list) modal ---- */
function openDeriveModal(sourceListingId) {
  const s = listing(sourceListingId); const p = product(s.productId);
  const perBase = pricePerBase(s);
  openModal(`<h3>Re-list under your storefront</h3>
  <p class="msub">Source: ${esc(p.name)} — ${esc(s.unit)} of ${s.unitContains} ${esc(p.baseUnit)}s at ${money(s.price)} (${money(perBase)}/${esc(p.baseUnit)}) from ${esc(acc(s.ownerId).alias)}.
  Your buyers will see <b>your</b> storefront, <b>your</b> unit and <b>your</b> price — never the supplier.</p>
  <div class="fld"><label>Your sale unit name</label><input id="dvunit" value="case"></div>
  <div class="fld"><label>${esc(p.baseUnit)}s per unit</label><input type="number" id="dvcontains" value="12" oninput="updDerive('${s.id}')"></div>
  <div class="fld"><label>Your price per unit</label><input type="number" id="dvprice" value="${Math.ceil(perBase * 12 * 1.4)}" step="0.01" oninput="updDerive('${s.id}')"></div>
  <div class="fld"><label>Your MOQ (units)</label><input type="number" id="dvmoq" value="5"></div>
  <div class="meta" id="dvmath"></div>
  <div class="row" style="justify-content:flex-end;margin-top:12px">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="submitDerive('${s.id}')">Create listing</button>
  </div>`);
  updDerive(s.id);
}
function updDerive(sourceId) {
  const s = listing(sourceId); const p = product(s.productId);
  const contains = parseInt(document.getElementById('dvcontains').value) || 1;
  const price = parseFloat(document.getElementById('dvprice').value) || 0;
  const cost = pricePerBase(s) * contains;
  const floorEdge = approved(s.ownerId, me().id, 'broker');
  const floor = floorEdge && floorEdge.terms.priceFloor;
  let txt = `Cost basis ${money(cost)}/unit → margin <b>${money(price - cost)}</b>/unit (${cost > 0 ? Math.round((price - cost) / cost * 100) : 0}% markup).`;
  if (floor && price / contains < floor) txt += ` <span style="color:var(--danger)">⚠ Below the supplier's price floor of ${money(floor)}/${esc(p.baseUnit)} — supplier terms block this.</span>`;
  document.getElementById('dvmath').innerHTML = txt;
}
function submitDerive(sourceId) {
  const s = listing(sourceId); const p = product(s.productId);
  const unit = document.getElementById('dvunit').value || 'case';
  const contains = parseInt(document.getElementById('dvcontains').value) || 1;
  const price = parseFloat(document.getElementById('dvprice').value) || 0;
  const moq = parseInt(document.getElementById('dvmoq').value) || 1;
  const floorEdge = approved(s.ownerId, me().id, 'broker');
  if (floorEdge && floorEdge.terms.priceFloor && price / contains < floorEdge.terms.priceFloor) {
    toast('Blocked: below the supplier’s price floor'); return;
  }
  state.listings.push({ id: uid('l'), ownerId: me().id, productId: s.productId, sourceId: s.id, unit, unitContains: contains,
    price, moq, heldStock: 0, active: true, negotiable: true, teaser: true, sponsored: false, adStats: { imp: 0, clicks: 0 } });
  closeModal(); state.session.view = 'listings'; render();
  toast('Live — your buyers now see this under your storefront');
}

/* ---- listing edit modal ---- */
function openListingEdit(id) {
  const l = listing(id); const p = product(l.productId);
  openModal(`<h3>Edit listing — ${esc(p.name)}</h3>
  <p class="msub">${l.sourceId ? 'Derived listing (yours). Source stock and provenance stay hidden from buyers.' : 'Source listing.'}</p>
  <div class="fld"><label>Price per ${esc(l.unit)}</label><input type="number" id="edprice" value="${l.price}" step="0.01"></div>
  <div class="fld"><label>MOQ</label><input type="number" id="edmoq" value="${l.moq}"></div>
  ${l.sourceId ? '' : `<div class="fld"><label>Stock (${esc(l.unit)}s)</label><input type="number" id="edstock" value="${l.stock}"></div>`}
  <div class="fld"><label><input type="checkbox" id="edneg" ${l.negotiable ? 'checked' : ''} style="width:auto"> Accept offers (negotiable)</label></div>
  <div class="fld"><label><input type="checkbox" id="edteaser" ${l.teaser ? 'checked' : ''} style="width:auto"> Show locked teaser to unapproved buyers</label></div>
  <div class="row" style="justify-content:flex-end">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="submitListingEdit('${l.id}')">Save</button>
  </div>`);
}
function submitListingEdit(id) {
  const l = listing(id);
  l.price = parseFloat(document.getElementById('edprice').value) || l.price;
  l.moq = parseInt(document.getElementById('edmoq').value) || l.moq;
  const st = document.getElementById('edstock'); if (st) l.stock = parseInt(st.value) || l.stock;
  l.negotiable = document.getElementById('edneg').checked;
  l.teaser = document.getElementById('edteaser').checked;
  closeModal(); render(); toast('Listing updated');
}

/* ---- product & source-listing modals (seller) ---- */
function openProductModal() {
  openModal(`<h3>Add product</h3>
  <p class="msub">Canonical record — listings reference it. Image: pick an emoji or upload a photo.</p>
  <div class="fld"><label>Name</label><input id="pdname" placeholder="e.g. Arborio Rice 5kg"></div>
  <div class="fld"><label>Category</label><input id="pdcat" placeholder="Food & Beverage"></div>
  <div class="fld"><label>Base unit (what one buyer-visible unit contains)</label><input id="pdbase" placeholder="bag"></div>
  <div class="fld"><label>Emoji image</label><input id="pdimg" placeholder="🍚" maxlength="4" style="width:80px"></div>
  <div class="fld"><label>…or upload a photo</label><input type="file" id="pdfile" accept="image/*"></div>
  <div class="fld"><label>Description</label><textarea id="pddesc"></textarea></div>
  <div class="row" style="justify-content:flex-end">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="submitProduct()">Add product</button>
  </div>`);
}
function submitProduct() {
  const name = document.getElementById('pdname').value.trim();
  if (!name) { toast('Name required'); return; }
  const fin = document.getElementById('pdfile');
  const done = (img) => {
    state.products.push({ id: uid('p'), ownerId: me().id, name,
      category: document.getElementById('pdcat').value || 'General',
      baseUnit: document.getElementById('pdbase').value || 'unit',
      img: img || document.getElementById('pdimg').value || '📦',
      desc: document.getElementById('pddesc').value || '' });
    closeModal(); render(); toast('Product added — now create a listing for it');
  };
  if (fin.files && fin.files[0]) {
    const r = new FileReader();
    r.onload = () => done(r.result);
    r.readAsDataURL(fin.files[0]);
  } else done(null);
}
function openSourceListingModal(productId) {
  const p = product(productId);
  openModal(`<h3>New listing — ${esc(p.name)}</h3>
  <p class="msub">Your channel, your terms: unit of sale, price, minimums. Brokers you approve can re-list this at their own unit and markup.</p>
  <div class="fld"><label>Sale unit name</label><input id="slunit" value="pallet"></div>
  <div class="fld"><label>${esc(p.baseUnit)}s per unit</label><input type="number" id="slcontains" value="100"></div>
  <div class="fld"><label>Price per unit</label><input type="number" id="slprice" value="1000" step="0.01"></div>
  <div class="fld"><label>MOQ (units)</label><input type="number" id="slmoq" value="1"></div>
  <div class="fld"><label>Stock (units)</label><input type="number" id="slstock" value="10"></div>
  <div class="row" style="justify-content:flex-end">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="submitSourceListing('${p.id}')">Publish listing</button>
  </div>`);
}
function submitSourceListing(productId) {
  state.listings.push({ id: uid('l'), ownerId: me().id, productId, sourceId: null,
    unit: document.getElementById('slunit').value || 'unit',
    unitContains: parseInt(document.getElementById('slcontains').value) || 1,
    price: parseFloat(document.getElementById('slprice').value) || 0,
    moq: parseInt(document.getElementById('slmoq').value) || 1,
    stock: parseInt(document.getElementById('slstock').value) || 0,
    active: true, negotiable: true, teaser: true, sponsored: false, adStats: { imp: 0, clicks: 0 } });
  closeModal(); state.session.view = 'listings'; render(); toast('Listing published to your approved buyers & brokers');
}

/* ---- terms modal ---- */
function openTermsModal(relId) {
  const r = state.rels.find(x => x.id === relId);
  const other = acc(r.granteeId);
  openModal(`<h3>Relationship terms</h3>
  <p class="msub">Your terms for <b>${esc(other.alias)}</b> (${r.kind}). Terms travel with the relationship — changing them applies immediately.</p>
  <div class="fld"><label>Communication</label>
    <select id="tmcomm">
      <option value="relay" ${r.terms.comm === 'relay' ? 'selected' : ''}>Relay — I stay in the middle</option>
      <option value="direct" ${r.terms.comm === 'direct' ? 'selected' : ''}>Direct allowed (still platform-filtered)</option>
    </select></div>
  <div class="fld"><label><input type="checkbox" id="tmreveal" ${r.terms.reveal ? 'checked' : ''} style="width:auto">
    Reveal my real identity to them <span class="meta">(one-way door — think before checking)</span></label></div>
  ${r.kind === 'broker' ? `<div class="fld"><label>Price floor per base unit (blocks re-listing below this; blank = none)</label>
    <input type="number" id="tmfloor" value="${r.terms.priceFloor ?? ''}" step="0.01"></div>` : ''}
  <div class="fld"><label>Minimum volume note</label><input id="tmmin" value="${esc(r.terms.minVolume || '')}" placeholder="e.g. 1 pallet per PO"></div>
  <div class="row" style="justify-content:flex-end">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="submitTerms('${r.id}')">Save terms</button>
  </div>`);
}
function submitTerms(relId) {
  const r = state.rels.find(x => x.id === relId);
  r.terms.comm = document.getElementById('tmcomm').value;
  r.terms.reveal = document.getElementById('tmreveal').checked;
  const fl = document.getElementById('tmfloor');
  if (fl) r.terms.priceFloor = fl.value === '' ? null : parseFloat(fl.value);
  r.terms.minVolume = document.getElementById('tmmin').value;
  closeModal(); render(); toast('Terms updated');
}

/* ---- invoice modal ---- */
function openInvoiceModal(orderId) {
  const o = order(orderId); const l = listing(o.listingId); const p = product(l.productId);
  const m = me().id;
  const iAmOwner = o.ownerId === m;
  const feeRate = feeRateFor(o.ownerId);
  const fee = o.downstreamId ? 0 : +(o.total * feeRate).toFixed(2);
  const isDerived = !!l.sourceId;
  let marginBlock = '';
  if (iAmOwner && isDerived) {
    const cb = costBasisPerUnit(l) * o.qty;
    marginBlock = `<div class="ledgerrow"><span>Your cost basis (pro-rata upstream)</span><span>${money(cb)}</span></div>
    <div class="ledgerrow"><span><b>Your gross margin</b></span><span class="amt pos">${money(o.total - fee - cb)}</span></div>`;
  }
  openModal(`<h3>Invoice — order #${o.id}</h3>
  <p class="msub">Documents are generated per hop with identities masked per each party's terms. This is the ${o.downstreamId ? 'wholesale (PO)' : 'retail'} hop.</p>
  <div class="ledgerrow"><span>Seller of record</span><span>${esc(acc(o.ownerId).alias)}</span></div>
  <div class="ledgerrow"><span>Buyer</span><span>${esc(acc(o.buyerId).alias)}</span></div>
  <div class="ledgerrow"><span>${esc(p.name)} — ${o.qty} × ${esc(l.unit)} @ ${money(o.unitPrice)}</span><span>${money(o.total)}</span></div>
  ${iAmOwner ? `<div class="ledgerrow"><span>Platform fee ${o.downstreamId ? '(wholesale hop — none)' : `(${(feeRate * 100).toFixed(1)}% — your volume tier)`}</span><span>−${money(fee)}</span></div>
  <div class="ledgerrow"><span><b>Net payout on delivery</b></span><span class="amt pos">${money(o.total - fee)}</b></span></div>` :
  `<div class="ledgerrow"><span><b>Total (escrow)</b></span><span class="amt neg">${money(o.total)}</span></div>`}
  ${marginBlock}
  <div class="row" style="justify-content:flex-end;margin-top:12px"><button class="btn" onclick="closeModal()">Close</button></div>`);
}

/* ---- rating modal ---- */
let _rateStars = 5;
function openRateModal(orderId, targetRole) {
  _rateStars = 5;
  const o = order(orderId);
  const targetId = targetRole === 'buyer' ? o.buyerId : o.ownerId;
  openModal(`<h3>Rate ${targetRole === 'buyer' ? 'buyer' : 'your counterparty'}</h3>
  <p class="msub">Order #${o.id} · rating ${esc(acc(targetId).alias)}. Ratings are double-blind on the real platform and attach to the storefront alias — reputation without exposure.</p>
  <div class="starpick" id="starpick">${[1,2,3,4,5].map(i => `<span class="on" data-i="${i}" onclick="pickStars(${i})">★</span>`).join('')}</div>
  <div class="fld" style="margin-top:10px"><label>Comment</label><textarea id="ratetext" placeholder="Accuracy, communication, fulfillment speed…"></textarea></div>
  <div class="row" style="justify-content:flex-end">
    <button class="btn" onclick="closeModal()">Skip</button>
    <button class="btn primary" onclick="submitRating('${o.id}','${targetRole}')">Submit rating</button>
  </div>`);
}
function pickStars(n) {
  _rateStars = n;
  document.querySelectorAll('#starpick span').forEach(s => s.classList.toggle('on', +s.dataset.i <= n));
}
function submitRating(orderId, targetRole) {
  const o = order(orderId);
  const targetId = targetRole === 'buyer' ? o.buyerId : o.ownerId;
  state.reviews.push({ id: uid('rv'), orderId, raterId: me().id, targetId,
    asRole: targetRole, stars: _rateStars, text: document.getElementById('ratetext').value || '', at: now() });
  if (targetRole === 'buyer') o.ratedByOwner = true; else o.ratedByBuyer = true;
  closeModal(); render(); toast('Rating submitted — attached to their storefront alias');
}

  <p class="msub"><b>Use the “Acting as” switcher</b> (top right) to play every side. A good tour:</p>
  <ol style="font-size:13px;line-height:1.7;color:var(--text-2);padding-left:18px">
    <li><b>Sam's Corner Market</b> (buyer): Marketplace shows olive oil with <b>2 case offers from 2 masked brokers</b>. Notice what you <i>can't</i> see: the supplier behind them — brokers' suppliers are shielded from their buyers by default. Order 10 cases from Nexus. Try messaging with a phone number in it.</li>
    <li><b>Nexus Trading</b> (broker): see the order auto-route into an upstream PO; in My Network, note the 🛡 shield toggle on your supplier; re-list something from the Source Catalog with your own markup.</li>
    <li><b>Atlas Foods</b> (seller): confirm & ship the upstream PO (blind drop-ship, broker's branding); invite a buyer directly — once they accept, brokers only serve <b>under 1 pallet</b> for your items (band partition) while you keep pallet-and-up.</li>
    <li>Back to <b>Sam</b>: confirm delivery → watch escrow split in everyone's Wallet → rate the storefront. Prefer brokers for an item you also buy direct? “Use brokers instead” drops the direct channel — but getting it back is the seller's call.</li>
  </ol>
  <p class="msub">Everything is local to your browser (localStorage). ↺ Reset restores this demo scenario. The full platform design lives in <b>BLUEPRINT.md</b> next to this file.</p>
  <div class="row" style="justify-content:flex-end"><button class="btn primary" onclick="closeModal();state.session.seenIntro=true;save()">Got it</button></div>`);
}

render();
if (!state.session.seenIntro) openIntro();
</script>
